{% extends "base.html" %} {% block content %}
<section class="section-surface">
  <div class="section-header">
    <div>
      <p class="section-label">Unexpected error</p>
      <h2 class="section-title">Something went wrong</h2>
      <p class="section-copy">
        The portal encountered an issue. Use the links below to return to a
        stable page.
      </p>
    </div>
    <span class="detail-chip">HTTP {{ status_code }}</span>
  </div>

  <div class="support-card mt-8">
    <p class="text-sm uppercase tracking-[0.3em] text-slate-400">
      Error details
    </p>
    <pre class="mt-3 whitespace-pre-wrap break-words text-sm text-slate-300">
{{ detail }}</pre
    >
  </div>

  <div class="mt-8 flex flex-wrap gap-3">
    <a href="/events" class="btn-action">Back to events</a>
    <a href="/login" class="btn-secondary">Login page</a>
  </div>
</section>
{% endblock %}
